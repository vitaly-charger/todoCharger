name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

env:
  REMOTE_PATH: /home/admin/web/todo.chargeragency.com.ua/public_html
  SHARED_PATH: /home/admin/web/todo.chargeragency.com.ua/private/shared

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, bcmath, zip, intl, mysql
          coverage: none

      - name: Composer install (no-dev)
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build assets
        run: |
          npm ci
          npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Ensure shared dirs on server
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} bash <<'EOSH'
          set -euo pipefail
          install -o admin -g admin -d /home/admin/web/todo.chargeragency.com.ua/private/shared/storage/{app/public,framework/{cache/data,sessions,views},logs}
          install -o admin -g admin -d /home/admin/web/todo.chargeragency.com.ua/private/shared
          test -f /home/admin/web/todo.chargeragency.com.ua/private/shared/.env || {
            echo "[deploy] .env missing on server at /home/admin/web/todo.chargeragency.com.ua/private/shared/.env"; exit 1; }
          EOSH

      - name: Sync code to server
        run: |
          rsync -az --delete \
            --exclude='.git' --exclude='.github' --exclude='node_modules' \
            --exclude='tests' --exclude='.env' --exclude='.env.*' \
            --exclude='storage' --exclude='deploy' \
            --rsync-path="sudo -u admin rsync" \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.REMOTE_PATH }}/

      - name: Activate release
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} bash <<'EOSH'
          set -euo pipefail
          ROOT=/home/admin/web/todo.chargeragency.com.ua/public_html
          SHARED=/home/admin/web/todo.chargeragency.com.ua/private/shared
          chown -R admin:admin "$ROOT"
          sudo -u admin ln -sfn "$SHARED/.env" "$ROOT/.env"
          sudo -u admin rm -rf "$ROOT/storage"
          sudo -u admin ln -sfn "$SHARED/storage" "$ROOT/storage"
          cd "$ROOT"
          sudo -u admin php artisan storage:link --force || true
          sudo -u admin php artisan migrate --force
          sudo -u admin php artisan config:cache
          sudo -u admin php artisan route:cache
          sudo -u admin php artisan view:cache
          systemctl reload php8.3-fpm || true
          systemctl reload apache2 || true
          EOSH
