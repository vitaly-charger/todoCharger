server {
    listen 80;
    server_name todo.chargeragency.com.ua;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name todo.chargeragency.com.ua;

    ssl_certificate     /etc/letsencrypt/live/todo.chargeragency.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/todo.chargeragency.com.ua/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/todo/current/public;
    index index.php;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    client_max_body_size 25M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_index index.php;
        fastcgi_read_timeout 60;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
    location ~ /\.(?!well-known).* { deny all; }
}
