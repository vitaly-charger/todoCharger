# --- HTTP → HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name todo.chargeragency.com.ua;
    return 301 https://$host$request_uri;
}

# --- Default catch-all to prevent HTTP/2 connection coalescing (fixes 421 Misdirected Request) ---
# When another vhost on this IP serves a cert that ALSO covers todo.chargeragency.com.ua
# (e.g. a wildcard *.chargeragency.com.ua), browsers may reuse that HTTP/2 connection
# and send requests for `todo.*` to the wrong vhost. This default server rejects the TLS
# handshake for any SNI we don't explicitly handle, forcing a fresh connection.
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;
    ssl_reject_handshake on;
}

# --- App vhost ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name todo.chargeragency.com.ua;

    ssl_certificate     /etc/letsencrypt/live/todo.chargeragency.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/todo.chargeragency.com.ua/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/todo/current/public;
    index index.php;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    client_max_body_size 25M;

    # Belt-and-braces: if a coalesced HTTP/2 request still slips in with a wrong Host,
    # answer 421 explicitly so the client retries on a fresh connection.
    if ($host != $server_name) {
        return 421;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_index index.php;
        fastcgi_read_timeout 60;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
    location ~ /\.(?!well-known).* { deny all; }
}
